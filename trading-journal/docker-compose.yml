services:
  # 1. Database Service (Postgres)
  db:
    image: postgres:16
    container_name: tradelog-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - tradelog_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5  

  # 2. Backend Service (Express API)
  backend:
    user: "1000:1000"
    build: ./backend
    container_name: tradelog-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: db
      DB_PORT: 5432
      UPLOAD_DIR: ${UPLOAD_DIR}
      PORT: 3000
      LOG_DIR: ${LOG_DIR}
    volumes:
      # Sincroniza tu código en tiempo real
      - ./backend:/usr/src/app
      # Evita que tu carpeta node_modules local sobrescriba la del contenedor
      - /usr/src/app/node_modules
      - ./backend/uploads:/usr/src/app/${UPLOAD_DIR}
      - ./backend/logs:/usr/src/app/${LOG_DIR}
    ports:
      - "127.0.0.1:3000:3000"
    command: npm run dev

  # 3. Frontend Service (React/Vite)
  frontend:
    build: ./frontend
    container_name: tradelog-frontend
    restart: always
    ports:
      - "127.0.0.1:5173:5173"
    stdin_open: true
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev

# Los volúmenes van al mismo nivel que 'services'
volumes:
  tradelog_db_data: