services:
  backend:
    user: "1000:1000"
    build: ./backend
    container_name: tradelog-backend
    restart: always
    env_file:
      - ./.env
    environment:
      # Sobreescriben el .env — el host debe ser el nombre del servicio Docker, no localhost
      DB_HOST: postgres
      DB_PORT: 5432
      PORT: 3002
      NODE_ENV: production
      UPLOAD_DIR: uploads
      LOG_DIR: logs
    volumes:
      - ${HOST_UPLOADS_DIR}:/usr/src/app/uploads
      - ${HOST_LOGS_DIR}:/usr/src/app/logs
    ports:
      - "127.0.0.1:3002:3002"
    networks:
      - tradelog_internal
      - market-tracker_internal  # red del postgres compartido - docker network ls | grep market # para saber el nombre exacto

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ""          # vacío si es el mismo host, o la URL completa si es diferente (ej: http://localhost:3002)
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: tradelog-frontend
    restart: always
    ports:
      - "127.0.0.1:5174:80"
    networks:
      - tradelog_internal

networks:
  tradelog_internal:
    driver: bridge
  market-tracker_internal:
    external: true               # red interna del proyecto market-tracker (donde vive postgres)
